<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chama OS Tips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#effaf4",
                            100: "#d9f2e2",
                            500: "#1f8f5f",
                            600: "#16734c",
                            700: "#125c3d"
                        },
                        ink: "#1f2937",
                        sand: "#f7f4ee",
                        gold: "#c98b1d"
                    },
                    boxShadow: {
                        soft: "0 12px 30px rgba(15, 23, 42, 0.08)"
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="assets/chama.css">
</head>
<body class="min-h-screen bg-sand text-ink">
    <header class="border-b border-stone-200 bg-white/95 backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6">
            <div>
                <p class="text-sm font-semibold uppercase tracking-[0.24em] text-brand-600">ChamaConnect</p>
                <h1 class="text-2xl font-black tracking-tight text-ink">Financial Tips</h1>
            </div>
            <a href="index.html" class="tap-btn rounded-2xl bg-brand-600 px-4 py-3 text-sm font-semibold text-white shadow-soft hover:bg-brand-700">
                Back to dashboard
            </a>
        </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-6 sm:px-6">
        <section class="hero-panel rounded-[28px] bg-white p-6 shadow-soft sm:p-8">
            <p class="mb-2 inline-flex items-center gap-2 rounded-full bg-gold/10 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-gold">
                Kenyan context
            </p>
            <h2 class="max-w-3xl text-3xl font-black leading-tight sm:text-4xl">Simple guidance for running your chama well, lending carefully, and growing savings steadily.</h2>
            <p class="mt-3 max-w-2xl text-sm leading-6 text-stone-600 sm:text-base">Each card uses everyday language and practical KES examples so members can act with confidence.</p>
        </section>

        <section class="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-3" id="tips-page-grid"></section>
    </main>

    <script type="module">
        import { educationTips, getIconSvg } from "./assets/chama-data.js";

        const grid = document.getElementById("tips-page-grid");
        grid.innerHTML = educationTips.map((tip) => `
            <article class="rounded-[28px] bg-white p-5 shadow-soft">
                <div class="mb-4 inline-flex rounded-2xl bg-stone-100 p-3 text-brand-700">
                    ${getIconSvg(tip.icon)}
                </div>
                <p class="text-xs font-semibold uppercase tracking-[0.2em] text-stone-500">${tip.category}</p>
                <h3 class="mt-2 text-xl font-black text-ink">${tip.title}</h3>
                <p class="mt-3 text-sm leading-6 text-stone-600">${tip.copy}</p>
                <div class="mt-4 rounded-2xl bg-brand-50 px-4 py-3 text-sm font-medium text-brand-700">${tip.example}</div>
            </article>
        `).join("");
    </script>
</body>
</html>
